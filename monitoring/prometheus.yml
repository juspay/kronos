global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "kronos-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: api

  - job_name: "kronos-worker"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9090"]
        labels:
          service: worker

  - job_name: "kronos-scheduler"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9091"]
        labels:
          service: scheduler
