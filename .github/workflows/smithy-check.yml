name: Smithy SDK Drift Check

on:
  pull_request:
    paths:
      - 'smithy/**'
      - 'sdks/rust/**'
      - 'justfile'
      - '.github/workflows/smithy-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-sdk-drift:
    name: Verify sdks/rust matches smithy/model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Smithy CLI
        run: |
          curl -L -o smithy.zip https://github.com/smithy-lang/smithy/releases/download/1.55.0/smithy-cli-linux-x86_64.zip
          unzip -q smithy.zip
          sudo ./smithy-cli-linux-x86_64/install
          smithy --version

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Regenerate Rust SDK and check for drift
        run: just smithy-check
