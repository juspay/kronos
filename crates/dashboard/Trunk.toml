[build]
target = "index.html"
dist = "dist"
# Set TE_DASHBOARD_PATH_PREFIX env var to serve under a prefix (e.g. "/dashboard")
# Then pass the same value here: trunk build --public-url /dashboard
# public_url = "/dashboard"

[watch]
watch = ["src", "index.html"]

[serve]
address = "127.0.0.1"
port = 3000

[[proxy]]
backend = "http://localhost:8080/v1"
rewrite = "/v1"
