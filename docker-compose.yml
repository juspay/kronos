version: "3.9"

services:
  cockroachdb:
    image: cockroachdb/cockroach:v23.2.0
    command: start-single-node --insecure --store=attrs=ssd,path=/cockroach/cockroach-data --http-port=28080
    ports:
      - "26257:26257"
      - "28080:28080"
    volumes:
      - cockroach-data:/cockroach/cockroach-data

  cockroach-init:
    image: cockroachdb/cockroach:v23.2.0
    depends_on:
      - cockroachdb
    entrypoint: >
      /bin/sh -c "
        sleep 5 &&
        cockroach sql --insecure --host=cockroachdb:26257 -e 'CREATE DATABASE IF NOT EXISTS taskexecutor;'
      "

  # Kafka (for kafka feature)
  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    volumes:
      - kafka-data:/bitnami/kafka
    profiles:
      - kafka

  # Redis (for redis-stream feature)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    profiles:
      - redis

volumes:
  cockroach-data:
  kafka-data:
  redis-data:
