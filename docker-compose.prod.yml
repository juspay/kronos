# Prod-like Docker Compose: all services on a shared network with KMS.
# Use via: ./scripts/docker-prod.sh (handles migrations + KMS init)

services:
  postgres:
    build: docker/postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kronos
      POSTGRES_PASSWORD: kronos
      POSTGRES_DB: taskexecutor
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_cron"
      - "-c"
      - "cron.database_name=taskexecutor"
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
      - ./migrations:/migrations:ro
    networks:
      - kronos-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kronos -d taskexecutor"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: kms
      AWS_DEFAULT_REGION: us-east-1
    networks:
      - kronos-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  kronos-mock-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINARY: kronos-mock-server
    ports:
      - "9999:9999"
    environment:
      MOCK_PORT: "9999"
    networks:
      - kronos-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9999/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  kronos-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINARY: kronos-api
        FEATURES: kms
        INCLUDE_DASHBOARD: "true"
    ports:
      - "8080:8080"
    env_file:
      - path: .env.prod.kms
        required: false
    environment:
      TE_LISTEN_ADDR: "0.0.0.0:8080"
      TE_MODE: "both"
      TE_PATH_PREFIX: "/kronos"
      TE_DASHBOARD_PATH_PREFIX: "/dashboard"
      TE_DASHBOARD_DIST_DIR: "/app/dashboard-dist"
    networks:
      - kronos-net
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/kronos/health"]
      interval: 5s
      timeout: 3s
      retries: 15

  kronos-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINARY: kronos-worker
        FEATURES: kms
    ports:
      - "9090:9090"
    env_file:
      - path: .env.prod.kms
        required: false
    environment:
      TE_METRICS_PORT: "9090"
    networks:
      - kronos-net
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      kronos-mock-server:
        condition: service_healthy

networks:
  kronos-net:
    driver: bridge

volumes:
  postgres-prod-data:
